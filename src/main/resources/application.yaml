spring:
  application:
    name: FestGuard
  datasource:
    url: jdbc:h2:mem:festguarddb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
  web:
      resources:
        cache:
          period: 0
        chain:
          cache: false


server:
  port: 8080
